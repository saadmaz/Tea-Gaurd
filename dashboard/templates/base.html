<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Tea Guard Admin — {% block title %}Dashboard{% endblock %}</title>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 800; letter-spacing: 0.5px; }
    .nav-link.active { background: rgba(255,255,255,0.15); border-radius: 6px; }
    .table th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; }
    .badge-role-admin { background: #198754; }
    .badge-role-manager { background: #0d6efd; }
    .badge-role-grower { background: #6c757d; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/users">🍃 Tea Guard Admin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if request.path == '/users' %}active{% endif %}" href="/users">👤 Users</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/devices' %}active{% endif %}" href="/devices">📡 Devices</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/audit' %}active{% endif %}" href="/audit">📋 Audit Log</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/models' %}active{% endif %}" href="/models">🤖 Models</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/map' %}active{% endif %}" href="/map">🗺 Map</a></li>
      </ul>
      <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
