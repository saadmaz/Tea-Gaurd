<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Tea Guard Admin — Login</title>
</head>
<body class="bg-success d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="card shadow" style="width:360px;">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-1">🍃 Tea Guard</h4>
      <p class="text-muted text-center small mb-4">Admin Dashboard</p>
      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" placeholder="admin@tea.lk" required autofocus/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-success w-100 fw-bold">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
